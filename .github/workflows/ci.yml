name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk:
    name: "@falcon-framework/sdk"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - name: Build (Bun)
        run: bun run sdk:build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build (Node, tsdown-supported runtime)
        working-directory: packages/sdk
        run: node ./node_modules/tsdown/dist/run.mjs

      - name: Typecheck
        run: bun run sdk:check-types

      - name: Publint
        run: bun run sdk:publint
