# Publishes @falcon-framework/sdk prereleases from non-draft, same-repo PRs targeting main.
# See README.md (SDK publishing → Preview builds) for behavior, tags, and secrets.
name: Preview SDK

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: preview-sdk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-preview:
    name: Publish @falcon-framework/sdk preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - name: Build (Bun)
        run: bun run sdk:build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build (Node, tsdown-supported runtime)
        working-directory: packages/sdk
        run: node ./node_modules/tsdown/dist/run.mjs

      - name: Typecheck
        run: bun run sdk:check-types

      - name: Publint
        run: bun run sdk:publint

      - name: Set preview version
        id: preview
        run: |
          VERSION="$(node scripts/set-sdk-preview-version.mjs)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Configure npm for publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: packages/sdk
        run: npm publish --tag beta --no-provenance --access public --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm dist-tag pr-${{ github.event.pull_request.number }}
        run: |
          npm dist-tag add "@falcon-framework/sdk@${{ steps.preview.outputs.version }}" "pr-${{ github.event.pull_request.number }}" --registry=https://registry.npmjs.org/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: bash scripts/publish-sdk-github.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_PUBLISH_IGNORE_SCRIPTS: "1"
