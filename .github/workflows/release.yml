name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Build SDK (Bun)
        run: bun run sdk:build

      - name: Build SDK (Node, tsdown-supported runtime)
        working-directory: packages/sdk
        run: node ./node_modules/tsdown/dist/run.mjs

      - name: Typecheck SDK
        run: bun run sdk:check-types

      - name: Publint SDK
        run: bun run sdk:publint

      # changeset publish runs npm; NPM_TOKEN in env alone is not enough — npm needs ~/.npmrc.
      - name: Configure npm for publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
